profiles:
  Official-Esp32-Board:
    fqbn: esp32:esp32:esp32doit-devkit-v1:UploadSpeed=921600,FlashFreq=80,DebugLevel=none,EraseFlash=none
    platforms:
      - platform: esp32:esp32 (3.3.7)
        platform_index_url: https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
    programmer: ""
    port: COM5
    port_config:
      baudrate: "115200"
      lineEnding: "\r\n"
      bits: "8"
      parity: none
      stop_bits: one
    libraries:
      - AdvancedPID (1.0.0)
      - ESP32Servo (3.1.3)
